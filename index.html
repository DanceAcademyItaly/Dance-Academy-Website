<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="screen-orientation" content="portrait">
    <title id="pageTitle">Dance Academy</title>

    <!-- Performance: Preconnect to external domains -->
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://www.youtube.com">
    <link rel="dns-prefetch" href="https://i.ytimg.com">
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preconnect" href="https://www.youtube.com" crossorigin>

    <!-- Preload Critical Resources -->
    <link rel="preload" href="Assets/logo.mp4" as="video" type="video/mp4">
    <link rel="preload" href="Assets/logo_inline.png" as="image">

    <!-- Lenis Smooth Scroll Library -->
    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>

    <!-- External CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Progress Bar -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- Header -->
    <header class="header-fixed" id="header">
        <span data-section="hero">HOME</span>
        <span data-section="episodi">EPISODI</span>
        <span data-section="missione">MISSIONE</span>
        <span data-section="candidati">CANDIDATI</span>
        <span data-section="contatti">CONTATTI</span>
    </header>

    <!-- Intro -->
    <div class="intro-overlay">
        <video id="introLogo" class="intro-logo" muted playsinline>
            <source src="" type="video/mp4">
        </video>
        <p id="introText" class="intro-text"></p>
    </div>

    <!-- Intro Loader (shown if resources aren't ready when intro video ends) -->
    <div class="intro-loader" id="introLoader">
        <div class="intro-loader-ring"></div>
    </div>

    <!-- Video Background -->
    <video id="videoBg" class="video-bg" muted loop playsinline autoplay>
        <source src="" type="video/mp4">
    </video>

    <!-- Hero -->
    <div class="hero-block block" data-block="hero">
        <div class="hero-container">
            <img id="heroLogo" src="" alt="Dance Academy" class="hero-logo">
            <p id="heroSubtitle" class="hero-text"></p>
        </div>
    </div>

    <!-- Episodi spacer - creates scroll range for episodi section -->
    <!-- Actual episodi elements (sidebar, content) are fixed at body level below -->
    <div class="episodi-spacer block" data-block="episodi"></div>

    <!-- Missione -->
    <div class="missione-block block" data-block="missione">
        <div id="missioneContainer" class="missione-container"></div>
    </div>

    <!-- Candidati spacer - creates scroll range for candidati section -->
    <!-- Actual candidati elements (title, cards, button) are fixed at body level below -->
    <div class="candidati-spacer block" data-block="candidati"></div>

    <!-- Contatti spacer - creates scroll range for contatti section -->
    <!-- Actual contatti container is fixed at body level below -->
    <div class="contatti-spacer block" data-block="contatti"></div>

    <!-- Contatti - Fixed container at body level as sibling to video -->
    <div id="contattiContainer" class="contatti-container"></div>

    <!-- Episodi - Restructured for direct backdrop-filter support -->
    <!-- Fixed container at body level as sibling to video -->

    <!-- Mobile episode selector (fixed at body level as sibling, hidden on desktop) -->
    <select class="episodi-mobile-selector" id="episodiMobileSelector" aria-label="Select episode">
    </select>

    <!-- Parent container (centered fixed element) -->
    <!-- REMOVED data-lenis-prevent: Now allows Lenis to handle PAGE scroll for momentum/smoothness -->
    <!-- Horizontal carousel has its own data-lenis-prevent (applied in JS to .carousel-container) -->
    <div class="episodi-container-wrapper">
        <!-- Sidebar wrapper -->
        <div class="episodi-sidebar-wrapper">
            <aside class="sidebar" id="sidebar"></aside>
        </div>

        <!-- Content wrapper -->
        <div class="episodi-content-wrapper">
            <div class="content-area" id="contentArea"></div>
        </div>
    </div>

    <!-- Candidati - Restructured for direct backdrop-filter support -->
        <!-- Fixed elements (title, cards, button) at body level as siblings to video -->

        <!-- Form element as ID reference only -->
        <form id="candidatiForm" style="display: none;" novalidate></form>

        <!-- Title wrapper (independent fixed element) -->
        <div class="candidati-title-wrapper">
            <h2 class="candidati-title">Candidati</h2>
        </div>

        <!-- Card 0 wrapper (independent fixed element, z-index: 100) -->
        <div class="candidati-card-wrapper" data-card="0">
            <div class="form-card">
                <div class="card-header">
                    <h3 class="card-title">Scuola</h3>
                </div>
                <div class="card-content">
                    <div class="form-group">
                        <input type="text" name="nomeScuola" placeholder="Nome della scuola" class="required" form="candidatiForm" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="citta" placeholder="Città" class="required" form="candidatiForm" required>
                    </div>
                    <div class="form-group">
                        <select id="provincia" name="provincia" class="required" form="candidatiForm" required>
                            <option value="" disabled selected>Seleziona provincia</option>
                            <!-- Populated by JavaScript -->
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="text" name="indirizzo" placeholder="Indirizzo completo" class="required" form="candidatiForm" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="annoFondazione" placeholder="Anno di fondazione" class="required" form="candidatiForm" required maxlength="4" inputmode="numeric" pattern="[0-9]{4}">
                    </div>
                    <div class="form-group">
                        <select name="numeroAllievi" class="required" form="candidatiForm" required>
                            <option value="" disabled selected>Numero di allievi attivi</option>
                            <option value="<50">Meno di 50</option>
                            <option value="50-100">50-100</option>
                            <option value="100-200">100-200</option>
                            <option value="200-500">200-500</option>
                            <option value="500+">Oltre 500</option>
                        </select>
                    </div>
                </div>
                <div class="card-navigation">
                    <button type="button" class="card-nav-button" data-direction="prev">
                        INDIETRO
                    </button>
                    <button type="button" class="card-nav-button" data-direction="next">
                        AVANTI
                    </button>
                </div>
            </div>
        </div>

        <!-- Card 1 wrapper (independent fixed element, z-index: 101) -->
        <div class="candidati-card-wrapper" data-card="1">
            <div class="form-card">
                <div class="card-header">
                    <h3 class="card-title">Referente</h3>
                </div>
                <div class="card-content">
                    <div class="form-group">
                        <input type="text" name="nome" placeholder="Nome" class="required" form="candidatiForm" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="cognome" placeholder="Cognome" class="required" form="candidatiForm" required>
                    </div>
                    <div class="form-group">
                        <select name="ruolo" class="required" form="candidatiForm" required>
                            <option value="" disabled selected>Ruolo</option>
                            <option value="proprietario">Proprietario/a</option>
                            <option value="direttore">Direttore/direttrice artistico/a</option>
                            <option value="amministratore">Amministratore/amministratrice</option>
                            <option value="insegnante">Insegnante principal</option>
                            <option value="altro">Altro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" placeholder="E-mail" class="required" form="candidatiForm" required>
                    </div>
                    <div class="form-group">
                        <input type="tel" name="telefono" placeholder="N. telefono" class="required" form="candidatiForm" required>
                    </div>
                </div>
                <div class="card-navigation">
                    <button type="button" class="card-nav-button" data-direction="prev">
                        INDIETRO
                    </button>
                    <button type="button" class="card-nav-button" data-direction="next">
                        AVANTI
                    </button>
                </div>
            </div>
        </div>

        <!-- Card 2 wrapper (independent fixed element, z-index: 102) -->
        <div class="candidati-card-wrapper" data-card="2">
            <div class="form-card">
                <div class="card-header">
                    <h3 class="card-title">Profilo Artistico</h3>
                </div>
                <div class="card-content">
                    <div class="form-group full-width">
                        <input type="text" name="discipline" placeholder="Discipline insegnate" class="required" form="candidatiForm" required>
                    </div>
                    <div class="form-group full-width">
                        <textarea name="riconoscimenti" placeholder="Riconoscimenti e risultati principali (ultimi 3 anni)" class="tall" form="candidatiForm"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <textarea name="unicita" placeholder="Cosa rende unica la vostra scuola?" class="tall required" form="candidatiForm" required></textarea>
                    </div>
                </div>
                <div class="card-navigation">
                    <button type="button" class="card-nav-button" data-direction="prev">
                        INDIETRO
                    </button>
                    <button type="button" class="card-nav-button" data-direction="next">
                        AVANTI
                    </button>
                </div>
            </div>
        </div>

        <!-- Card 3 wrapper (independent fixed element, z-index: 103) -->
        <div class="candidati-card-wrapper" data-card="3">
            <div class="form-card">
                <div class="card-header">
                    <h3 class="card-title">Presenza Online</h3>
                </div>
                <div class="card-content">
                    <div class="form-group">
                        <input type="url" name="sitoWeb" placeholder="Sito web" form="candidatiForm">
                    </div>
                    <div class="form-group">
                        <input type="text" name="instagram" placeholder="Instagram" form="candidatiForm">
                    </div>
                    <div class="form-group">
                        <input type="text" name="facebook" placeholder="Facebook" form="candidatiForm">
                    </div>
                    <div class="form-group">
                        <input type="text" name="contenutiSocial" placeholder="Attualmente create contenuti per i social?" class="required" form="candidatiForm" required>
                    </div>
                </div>
                <div class="card-navigation">
                    <button type="button" class="card-nav-button" data-direction="prev">
                        INDIETRO
                    </button>
                    <button type="button" class="card-nav-button" data-direction="next">
                        AVANTI
                    </button>
                </div>
            </div>
        </div>

        <!-- Card 4 wrapper (independent fixed element, z-index: 104) -->
        <div class="candidati-card-wrapper" data-card="4">
            <div class="form-card">
                <div class="card-header">
                    <h3 class="card-title">Il Vostro Interesse</h3>
                </div>
                <div class="card-content">
                    <div class="form-group full-width">
                        <textarea name="perche" placeholder="Perché volete partecipare a Dance Academy?" class="tall required" form="candidatiForm" required></textarea>
                    </div>
                    <div class="form-group full-width">
                        <select name="disponibilita" class="required" form="candidatiForm" required>
                            <option value="" disabled selected>Disponibilità per le riprese</option>
                            <option value="subito">Da subito</option>
                            <option value="1mese">Entro 1 mese</option>
                            <option value="2mesi">Entro 2 mesi</option>
                            <option value="3mesi">Entro 3 mesi</option>
                            <option value="concordare">Da concordare</option>
                        </select>
                    </div>
                    <div class="form-info">
                        Le riprese richiedono 1-2 giorni presso la vostra sede. Il nostro team gestirà tutta la produzione tecnica.
                    </div>
                    <div class="form-group full-width">
                        <textarea name="altreInfo" placeholder="Altre informazioni che vorreste condividere" class="tall" form="candidatiForm"></textarea>
                    </div>
                </div>
                <div class="card-navigation">
                    <button type="button" class="card-nav-button" data-direction="prev">
                        INDIETRO
                    </button>
                    <button type="button" class="card-nav-button" data-direction="next">
                        AVANTI
                    </button>
                </div>
            </div>
        </div>

        <!-- Submit button wrapper (independent fixed element, z-index: 111) -->
        <div class="submit-button-container">
            <button type="submit" form="candidatiForm" class="submit-button">INVIA CANDIDATURA</button>
        </div>


    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <!-- Main JavaScript (ES6 Modules) -->
    <script type="module" src="js/main.js"></script>

    <!-- Form Handler (standalone script) -->
    <script src="form-handler.js"></script>
</body>
</html>
