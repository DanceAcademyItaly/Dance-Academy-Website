<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Dance Academy</title>

    <!-- Lenis Smooth Scroll Library -->
    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --accent: #96795c;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.8);
            --text-muted: rgba(255, 255, 255, 0.5);
            --bg-dark: rgba(0, 0, 0, 0.02);
            --bg-medium: rgba(0, 0, 0, 0.5);
            --bg-strong: rgba(0, 0, 0, 0.7);
            --border-default: rgba(255, 255, 255, 0.2);
            --border-hover: rgba(255, 255, 255, 0.3);
            --border-active: rgba(255, 255, 255, 0.6);
            --border-light: rgba(255, 255, 255, 0.1);

            /* Fluid Typography System */
            /* Scaling from 320px (mobile) to 2560px (large desktop) */
            --text-2xs: clamp(0.5rem, 0.45rem + 0.25vw, 0.75rem);      /* 8px -> 12px */
            --text-xs: clamp(0.6875rem, 0.65rem + 0.1875vw, 0.875rem); /* 11px -> 14px */
            --text-sm: clamp(0.75rem, 0.7rem + 0.25vw, 1rem);          /* 12px -> 16px */
            --text-base: clamp(0.875rem, 0.8rem + 0.375vw, 1.25rem);   /* 14px -> 20px */
            --text-lg: clamp(1rem, 0.9rem + 0.5vw, 1.5rem);            /* 16px -> 24px */
            --text-xl: clamp(1.125rem, 1rem + 0.625vw, 1.75rem);       /* 18px -> 28px */
            --text-2xl: clamp(1.25rem, 1.1rem + 0.75vw, 2rem);         /* 20px -> 32px */
            --text-3xl: clamp(1.5rem, 1.3rem + 1vw, 2.5rem);           /* 24px -> 40px */
            --text-4xl: clamp(1.75rem, 1.5rem + 1.25vw, 3rem);         /* 28px -> 48px */

            /* Letter spacing scales slightly with viewport */
            --letter-spacing-tight: clamp(-0.025em, -0.02em + -0.01vw, 0em);
            --letter-spacing-normal: 0;
            --letter-spacing-wide: clamp(0.025em, 0.02em + 0.01vw, 0.1em);
            --letter-spacing-wider: clamp(0.05em, 0.04em + 0.05vw, 0.2em);
            --letter-spacing-widest: clamp(0.1em, 0.08em + 0.1vw, 0.3em);
        }

        html {
            scroll-behavior: smooth;
        }

        /* Lenis smooth scroll foundation */
        html.lenis, html.lenis body {
            height: auto;
        }

        .lenis.lenis-smooth {
            scroll-behavior: auto !important;
        }

        .lenis.lenis-stopped {
            overflow: hidden;
        }

        .lenis.lenis-smooth iframe {
            pointer-events: none;
        }

        /* Enhanced progressive enhancement for reduced motion */
        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto !important;
            }

            .lenis.lenis-smooth {
                scroll-behavior: auto !important;
            }

            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 300;
            line-height: 1.6;
            background: var(--black);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Hide scrollbar - webkit browsers (Chrome, Safari, Edge) */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* Hide scrollbar - Firefox */
        html {
            scrollbar-width: none;
        }

        /* Alternative: Make scrollbar almost invisible (uncomment to use instead) */
        /*
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        html {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }
        */

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 2px;
            background: var(--accent);
            z-index: 10001;
            transition: width 0.1s linear;
        }

        /* Header */
        .header-fixed {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 10000;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
        }

        .header-fixed span {
            font-size: var(--text-sm);
            letter-spacing: var(--letter-spacing-wider);
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 300;
            transition: all 0.4s ease;
            cursor: pointer;
            pointer-events: all;
        }
        
        .header-fixed span:hover {
            color: var(--text-primary);
        }

        .header-fixed span.active {
            color: var(--text-primary);
        }

        /* Intro */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--black);
            z-index: 20000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 1;
            visibility: visible;
            pointer-events: none;
        }

        .intro-overlay.animate {
            animation: introFade 5s ease-in-out forwards;
        }

        .intro-logo {
            width: calc(80vh * (100vw / 480px) * 0.8);
            min-width: 80vh;
            max-width: 96vh;
            height: auto;
            object-fit: contain;
            opacity: 0;
        }

        .intro-logo.animate {
            animation: logoFade 5s ease-in-out forwards;
        }

        .intro-text {
            color: var(--text-primary);
            font-size: var(--text-3xl);
            text-align: center;
            margin-top: 40px;
            opacity: 0;
            line-height: 1.2;
        }

        .intro-text.animate {
            animation: textFade 5s ease-in-out forwards;
        }

        @keyframes introFade {
            0%, 80% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }

        @keyframes logoFade {
            0% { opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes textFade {
            0%, 50% { opacity: 0; }
            60% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Video Background */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0;
            filter: grayscale(25%) brightness(0.50) contrast(1.2);
        }

        .video-bg.animate {
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Scroll Container */
        .scroll-container {
            opacity: 0;
        }

        .scroll-container.animate {
            animation: fadeIn 0.5s ease-in forwards;
        }

        /* Blocks */
        .block {
            position: relative;
            width: 100%;
        }

        /* Hero Block - Container System */
        .hero-block {
            height: 100vh;
            padding: clamp(40px, 10vh, 80px) clamp(20px, 5vw, 40px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-container {
            display: grid;
            gap: clamp(20px, 4vh, 40px);
            justify-items: center;
            max-width: min(800px, 90vw);
            max-height: 80vh;
            width: 100%;
            text-align: center;
        }

        .hero-logo {
            height: clamp(60px, 12vh, 140px);
            width: auto;
            max-width: 90vw;
            object-fit: contain;
        }

        .hero-text {
            font-size: var(--text-xl);
            color: var(--text-secondary);
            line-height: 1.6;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
        }

        /* Episodi Block - Container System */
        .episodi-block {
            min-height: 100vh;
            padding: clamp(40px, 8vh, 80px) clamp(20px, 5vw, 40px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .episodi-container {
            display: grid;
            grid-template-columns: minmax(200px, 250px) auto;
            gap: 15px;
            max-width: min(1200px, 95vw);
            max-height: 85vh;
            overflow: hidden;
        }


        /* Sidebar */
        .sidebar {
            overflow-y: auto;
            height: 100%;
            max-height: 100%;
        }

        .stagione-accordion {
            margin-bottom: 0;
        }

        .accordion-header {
            padding: 20px;
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wider);
            font-size: var(--text-sm);
            color: var(--text-secondary);
            cursor: pointer;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px) saturate(90%);
            -webkit-backdrop-filter: blur(20px) saturate(90%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.9),
                0 12px 32px rgba(0, 0, 0, 0.7),
                0 6px 16px rgba(0, 0, 0, 0.5),
                0 2px 8px rgba(0, 0, 0, 0.4),
                inset 0 -1px 0 rgba(0, 0, 0, 0.6);
            transition: all 0.3s;
        }

        .accordion-header:hover {
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .accordion-header.active {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px) saturate(90%);
            -webkit-backdrop-filter: blur(20px) saturate(90%);
            border: 2px solid var(--border-active);
            color: var(--text-primary);
        }

        .episodi-list {
            list-style: none;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .episodi-list.expanded {
            max-height: 500px;
        }

        .episodio-item {
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wide);
            font-size: var(--text-xs);
            color: var(--text-secondary);
            padding: 16px 20px;
            background: var(--bg-dark);
            border-left: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .episodio-item:hover {
            color: var(--text-primary);
            border-left-color: var(--border-hover);
            transform: translateX(5px);
        }

        .episodio-item.active {
            color: var(--text-primary);
            border-left: 2px solid var(--border-active);
            transform: translateX(5px);
        }

        /* Content Area */
        .content-area {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-height: 100%;
            overflow: auto;
        }

        .episodio-content {
            display: none;
        }

        .episodio-content.active {
            display: block;
            width: fit-content;
        }

        .video-principale {
            width: 100%;
            max-width: 100%;
            min-width: 0;
            aspect-ratio: 16/9;
            background: var(--bg-dark);
            border: 1px solid var(--border-default);
            margin-bottom: clamp(15px, 3vh, 30px);
            flex-shrink: 0;
        }

        .video-principale iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .coreografie-section {
            margin-top: clamp(10px, 2vh, 20px);
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            flex: 1;
            min-height: 0;
        }

        .coreografie-header {
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wider);
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
            width: 100%;
        }

        .coreografie-grid {
            display: flex;
            gap: 20px;
            flex-shrink: 0;
            width: 100%;
        }

        .coreo-card {
            background: var(--bg-medium);
            border: 1px solid var(--border-default);
            flex: 1;
            transition: all 0.3s;
        }

        .coreo-card:hover {
            border-color: var(--border-hover);
        }

        .coreo-video {
            aspect-ratio: 16/9;
            background: var(--black);
        }

        .coreo-video iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .coreo-title {
            padding: 15px;
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wide);
            color: var(--text-secondary);
        }

        /* Missione Block */
        .missione-block {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Responsive padding that ensures content fits */
            padding: clamp(20px, 8vh, 80px) clamp(15px, 5vw, 40px);
        }

        .missione-container {
            max-width: clamp(300px, 80vw, 800px);
            text-align: center;
            /* Ensure container scales with viewport height to prevent overlaps */
            max-height: 85vh;
            overflow-y: auto;
            /* Dynamic padding that scales with viewport */
            padding: clamp(10px, 2vh, 20px) clamp(15px, 3vw, 30px);
        }

        /* Missione Responsive Scaling System */
        .copy-block {
            /* Dynamic margins based on viewport height and width */
            margin: clamp(15px, 3vh, 40px) 0;
        }

        /* Custom classes for missione elements to avoid conflicts */
        .missione-title {
            font-size: clamp(1.2rem, 3vw + 1vh, 2.26rem);
            font-weight: 300;
            letter-spacing: 0.5px; /* Slightly increased letter spacing */
            line-height: clamp(1.2, 1.3, 1.4);
            margin-bottom: 0.5rem; /* 0.5rem between h3 and its related p */
            /* Ensure title scales with both width and height */
            max-width: 100%;
            word-wrap: break-word;
        }

        .missione-text {
            color: var(--text-secondary);
            line-height: clamp(1.4, 1.6, 1.8);
            font-size: clamp(0.9rem, 2vw + 0.5vh, 1.4rem);
            margin-bottom: 3rem; /* 3rem between p and following h3 (or button) */
            /* Ensure text scales properly and doesn't overflow */
            max-width: 100%;
            word-wrap: break-word;
        }

        .cta-container {
            margin-top: clamp(20px, 4vh, 60px);
        }

        .missione-button {
            display: inline-block;
            background: var(--bg-medium);
            border: 1px solid var(--border-default);
            color: var(--text-secondary);
            /* Responsive padding that scales with viewport */
            padding: clamp(12px, 2vh, 20px) clamp(25px, 4vw, 50px);
            text-transform: uppercase;
            letter-spacing: clamp(1px, 0.3vw, 3px);
            /* Button text scales appropriately */
            font-size: clamp(10px, 1.5vw + 0.5vh, 14px);
            text-decoration: none;
            transition: all 0.3s;
            /* Ensure button doesn't get too wide on large screens */
            max-width: 300px;
            text-align: center;
        }

        .missione-button:hover {
            background: var(--bg-strong);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        /* Missione elements - visible by default (no animations) */
        .missione-container .copy-block,
        .missione-container .cta-container {
            opacity: 1;
            visibility: visible;
        }


        /* Candidati Block - Card Stack Animation System */
        /* Candidati spacer - for scroll range */
        .candidati-spacer {
            height: 600vh; /* Set dynamically by JS, this is initial */
            width: 1px;
            visibility: hidden;
        }

        /* Title wrapper - independent fixed element */
        .candidati-title-wrapper {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 110; /* Above all cards */
            opacity: 0; /* Controlled by JS */
        }

        .candidati-title {
            font-size: clamp(1.5rem, 3vw + 1vh, 2.5rem);
            font-weight: 300;
            letter-spacing: var(--letter-spacing-widest);
            text-transform: uppercase;
            text-align: center;
            margin: 0 0 clamp(5px, 1vh, 10px) 0; /* Bottom margin for spacing below title */
        }

        /* Card wrappers - independent fixed elements with stacked z-indexes */
        /* GLASSMORPHISM - backdrop-filter must be on wrapper (not nested element) to blur video */
        .candidati-card-wrapper {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translate(-50%, 0); /* Adjusted by JS for animation */
            opacity: 0; /* Controlled by JS */
            /* Glassmorphism effect on wrapper level */
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px) saturate(90%);
            -webkit-backdrop-filter: blur(20px) saturate(90%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            /* 5-layer shadow system for enhanced depth perception */
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.9),
                0 12px 32px rgba(0, 0, 0, 0.7),
                0 6px 16px rgba(0, 0, 0, 0.5),
                0 2px 8px rgba(0, 0, 0, 0.4),
                inset 0 -1px 0 rgba(0, 0, 0, 0.6);
        }

        /* Individual cards get incrementing z-indexes via JS */
        .candidati-card-wrapper[data-card="0"] { z-index: 100; }
        .candidati-card-wrapper[data-card="1"] { z-index: 101; }
        .candidati-card-wrapper[data-card="2"] { z-index: 102; }
        .candidati-card-wrapper[data-card="3"] { z-index: 103; }
        .candidati-card-wrapper[data-card="4"] { z-index: 104; }

        /* Individual form cards - layout and styling */
        .form-card {
            /* Position relative (wrapper handles fixed positioning and glassmorphism) */
            position: relative;
            overflow: hidden;
            border-radius: 2px; /* Match wrapper border-radius for content clipping */
            /* Grid layout: header | content | navigation */
            display: grid;
            grid-template-rows: auto 1fr auto;
            /* Height set dynamically by JavaScript to fill available space */
            /* Prevents cards from extending beyond viewport */
            min-height: 400px; /* Minimum usable height */
        }

        /* Card header */
        .card-header {
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 8px; /* Minimal spacing */
            margin-bottom: 0; /* No margin - grid controls spacing */
        }

        .card-title {
            font-size: clamp(1rem, 1.5vw + 0.5vh, 1.75rem);
            font-weight: 300;
            letter-spacing: var(--letter-spacing-widest);
            text-transform: uppercase;
            text-align: center;
            margin: 0;
            color: var(--text-primary);
        }

        /* Card content area - grid layout, minimal spacing, top-aligned */
        .card-content {
            overflow: visible; /* No scrolling - content will fit */
            display: grid;
            grid-template-columns: 1fr; /* Single column by default (mobile) */
            grid-auto-rows: auto; /* Rows size to content */
            gap: 6px; /* Minimal vertical gap between fields */
            align-content: start; /* Align to top */
            padding-top: 10px; /* Minimal spacing from header */
        }

        /* Card navigation - grid with 2 columns for consistent alignment */
        .card-navigation {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Always 2 columns */
            gap: 10px; /* Minimal gap between buttons */
            padding-top: 10px; /* Minimal top padding */
            margin-top: 0; /* No margin - grid row gap handles spacing */
            border-top: 1px solid var(--border-light);
        }

        /* Single button in navigation: align to correct column */
        .card-navigation button[data-direction="prev"]:only-child {
            grid-column: 1; /* Left column */
        }

        .card-navigation button[data-direction="next"]:only-child {
            grid-column: 2; /* Right column */
        }

        /* When prev is hidden (first card), align next to right */
        .card-navigation button[data-direction="prev"][style*="display: none"] ~ button[data-direction="next"],
        .card-navigation button[data-direction="prev"][style*="display:none"] ~ button[data-direction="next"] {
            grid-column: 2; /* Right column */
        }

        /* When next is hidden (last card), align prev to left */
        .card-navigation button[data-direction="next"][style*="display: none"] ~ button[data-direction="prev"],
        .card-navigation button[data-direction="next"][style*="display:none"] ~ button[data-direction="prev"] {
            grid-column: 1; /* Left column (default, but explicit) */
        }

        .card-nav-button {
            /* No flex - grid child now */
            width: 100%; /* Fill grid cell */
            padding: clamp(10px, 1.5vh, 14px) clamp(16px, 2.5vw, 28px);
            background: var(--bg-medium);
            border: 1px solid var(--border-default);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wider);
            font-size: clamp(9px, 1vw + 0.3vh, 12px);
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-weight: 300;
        }

        .card-nav-button:hover {
            color: var(--text-primary);
            border-color: var(--border-hover);
            transform: translateY(-1px);
        }

        .card-nav-button .btn-symbol {
            opacity: 0.5;
            font-weight: 200;
        }

        /* Form groups and inputs */
        .form-group {
            margin-bottom: 0; /* No margin - grid gap controls spacing */
            position: relative;
            width: 100%; /* Fill column */
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%; /* Fill parent */
            box-sizing: border-box;
            padding: clamp(12px, 1.5vh, 16px) clamp(14px, 2vw, 18px);
            background: var(--bg-strong);
            border: 1px solid var(--border-default);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: clamp(10px, 1vw + 0.2vh, 13px);
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wide);
            transition: all 0.3s;
            display: block; /* Ensure full width */
        }

        .form-group input::placeholder,
        .form-group select::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-secondary);
        }

        .form-group input:hover,
        .form-group select:hover,
        .form-group textarea:hover {
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            color: var(--text-primary);
            border-color: var(--border-hover);
        }

        .form-group textarea {
            min-height: clamp(60px, 8vh, 80px);
            max-height: clamp(120px, 18vh, 200px);
            resize: vertical;
            text-transform: none;
        }

        .form-group textarea.tall {
            min-height: clamp(80px, 12vh, 120px);
            max-height: clamp(150px, 22vh, 250px);
        }

        .form-group select {
            cursor: pointer;
            appearance: none;

            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 20px;
            padding-right: 45px;
        }

        /* Required field asterisk - positioned inside input on the right */
        .form-group:has(input.required)::after,
        .form-group:has(select.required)::after {
            content: '*';
            position: absolute;
            right: clamp(14px, 2vw, 18px);
            top: 50%;
            transform: translateY(-50%);

            font-size: clamp(11px, 1.1vw + 0.3vh, 14px);
            pointer-events: none;
            z-index: 1;
        }

        /* Asterisk for select fields - position before dropdown arrow */
        .form-group:has(select.required)::after {
            right: clamp(40px, 4vw, 50px);
        }

        /* Asterisk for textarea fields - position at top right */
        .form-group:has(textarea.required)::after {
            content: '*';
            position: absolute;
            right: clamp(14px, 2vw, 18px);
            top: clamp(16px, 2vh, 22px);
            transform: none;
            color: var(--accent);
            font-size: clamp(11px, 1.1vw + 0.3vh, 14px);
            pointer-events: none;
            z-index: 1;
        }

        .form-info {
            padding: clamp(10px, 1.5vh, 14px) clamp(12px, 2vw, 16px);

        }

        /* Submit button container */
        .submit-button-container {

            text-transform: uppercase;
            /* Match missione-button letter-spacing */

        /* Desktop layout (two-column grid) */
        @media (min-width: 769px) {

            /* Full-width elements span both columns */
            .card-content .form-info,
            .card-content .form-group.full-width {
                grid-column: 1 / -1;
            }
        }

        /* Mobile layout (single column) */
        @media (max-width: 768px) {
            .form-card {
                width: clamp(300px, 88vw, 400px);
                padding: clamp(18px, 2.5vh, 25px) clamp(18px, 4vw, 25px);

            }

        /* Contatti Block - Container System */
        .contatti-block {
            min-height: 100vh;
            max-height: 100vh;
            padding: clamp(40px, 8vh, 80px) clamp(20px, 5vw, 40px);
            display: grid;

            overflow: hidden;
        }

        .contatti-container {

            max-height: 85vh;
            width: 100%;
            text-align: center;
            overflow: auto;

        /* Popup Styles */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9999;

        }

        .popup-content {
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid var(--border-default);
            color: var(--text-primary);
            padding: 40px 50px;
            text-align: center;
            z-index: 10000;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            font-family: inherit;
            font-weight: 300;
            animation: popupSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .popup-content.success {
            border-color: var(--accent);
        }

        .popup-title {
            margin: 0 0 20px 0;
            font-size: var(--text-3xl);
            font-weight: 300;
            letter-spacing: var(--letter-spacing-widest);
            text-transform: uppercase;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .popup-title.success {
            color: var(--accent);
        }

        .popup-message {
            margin: 0 0 30px 0;
            font-size: var(--text-lg);
            line-height: 1.6;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .popup-button {
            background: var(--bg-medium);
            border: 1px solid var(--border-default);
            color: var(--text-secondary);
            padding: 15px 35px;
            text-transform: uppercase;
            letter-spacing: var(--letter-spacing-wider);
            font-size: var(--text-sm);
            cursor: pointer;
            font-family: inherit;
            font-weight: 300;
            transition: all 0.3s ease;
        }

        .popup-button:hover {
            color: var(--text-primary);
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        @keyframes overlayFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popupSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Extreme small viewport handling */
        @media (max-width: 320px) or (max-height: 480px) {

                padding: clamp(3px, 0.5vh, 10px) clamp(5px, 1vw, 15px);
